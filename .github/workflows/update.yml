name: Update Market Data

on:
  schedule:
    # 毎日 月〜金 22:00 UTC（日本時間 翌朝7時・市場クローズ後）
    - cron: "0 22 * * 1-6"
  workflow_dispatch:  # 手動実行ボタンも有効

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # docs/ への push に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
